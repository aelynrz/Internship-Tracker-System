<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - Internship System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <h2>InternTrack</h2>
            <nav>
                <a href="#" class="active">Dashboard</a>
                <a href="#">Profile</a>
                <a href="#">Settings</a>
                <a href="../authorisation/login.php" class="logout-btn">Logout</a>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header>
                <h1>Welcome Back, Applicant</h1>
            </header>

            <!-- Status Section -->
            <section class="status-card">
                <h3>Application Status</h3>
                <div class="status-badge pending" id="applicationStatus">Pending Review</div>
            </section>

            <!-- Submission Form -->
            <section class="form-section">
                <h2>Submit Internship Details</h2>
                <form id="internshipForm">
                    <div class="form-group">
                        <label for="companyName">Company Name</label>
                        <input type="text" id="companyName" required placeholder="e.g. Tech Corp Inc.">
                    </div>
                    
                    <div class="form-group">
                        <label for="position">Position / Role</label>
                        <input type="text" id="position" required placeholder="e.g. Software Engineer Intern">
                    </div>

                    <div class="form-group">
                        <label for="duration">Duration (Months)</label>
                        <input type="number" id="duration" min="1" max="12" required placeholder="e.g. 3">
                    </div>

                    <button type="submit" class="submit-btn">Submit Request</button>
                </form>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
