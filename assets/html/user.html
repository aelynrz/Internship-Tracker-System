<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship Tracker - Authentication</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <!-- Tab Navigation Buttons -->
        <div class="tab-box">
            <button class="tab-btn active" onclick="switchTab('login')">Log In</button>
            <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <!-- Log In Form Container -->
        <div id="loginFormContainer" class="form-container active">
            <h2>Welcome Back</h2>
            <p>Log into your internship tracker account</p>
            <form action="../../backEnd/authorisation/login.php" method="POST">
                <div class="input-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" name="email" required placeholder="name@example.com">
                </div>
                <div class="input-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" name="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="auth-btn">Log In</button>
            </form>
        </div>

        <!-- Sign Up Form Container -->
        <div id="signupFormContainer" class="form-container">
            <h2>Create Account</h2>
            <p>Register as a new student to start tracking</p>
            <form action="../../backEnd/authorisation/signup.php" method="POST">
                <div class="input-group">
                    <label for="signupName">Full Name</label>
                    <input type="text" id="signupName" name="fullname" required placeholder="John Doe">
                </div>
                <div class="input-group">
                    <label for="signupEmail">Email Address</label>
                    <input type="email" id="signupEmail" name="email" required placeholder="name@example.com">
                </div>
                <div class="input-group">
                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" name="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="auth-btn">Sign Up</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
